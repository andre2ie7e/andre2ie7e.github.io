<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: LightSteelBlue;
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
        }

        /* Barra de navegación fija */
        .navbar {
            background-color: #2A2D86;
            overflow: hidden;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
        }

        .navbar a, .navbar button {
            float: left;
            display: block;
            color: white;
            text-align: center;
            padding: 14px 16px;
            text-decoration: none;
            font-size: 17px;
        }

        .navbar button {
            background-color: #2A2D86;
            border: none;
            cursor: pointer;
        }

        .navbar a:hover, .navbar button:hover {
            background-color: #111;
        }

        .navbar img {
            float: left;
            padding: 10px;
            width: 80px;
        }

        /* Espacio para no superponer con la barra fija */
        .content {
            padding-top: 100px;
        }

        /* Estilos del carrusel */
        .carousel {
            position: relative;
            max-width: 100%;
            margin: auto;
        }

        .carousel img {
            width: 100%;
            height: 400px;
        }

        .prev, .next {
            cursor: pointer;
            position: absolute;
            top: 50%;
            width: auto;
            padding: 16px;
            color: white;
            font-weight: bold;
            font-size: 18px;
            transition: 0.6s ease;
            border-radius: 0 3px 3px 0;
        }

        .next {
            right: 0;
            border-radius: 3px 0 0 3px;
        }

        .prev:hover, .next:hover {
            background-color: rgba(0, 0, 0, 0.8);
        }

        .dots {
            text-align: center;
            padding: 10px 0;
        }

        .dots span {
            cursor: pointer;
            height: 15px;
            width: 15px;
            margin: 0 2px;
            background-color: #bbb;
            border-radius: 50%;
            display: inline-block;
            transition: background-color 0.6s ease;
        }

        .active, .dots span:hover {
            background-color: #717171;
        }
    </style>
</head>
<body>

<!-- Barra de navegación fija -->
<div class="navbar">
    <a href="#inicio"><img src="acliclas-m2670937.jpg" alt="LOGO"></a>
    <a href="https://antonioperu.com/products/nike-m2k-tekno" target="_blank">Novedades</a>
    <a href="https://github.com/andre2ie7e/andre2ie7e.github.io/blob/main/20.png" target="_blank">Ofertas</a>
    <a href="https://www.adidas.pe/zapatillas-hombre" target="_blank">Zapatillas</a>
    <a href="https://github.com/andre2ie7e/andre2ie7e.github.io/commit/800fce688d37649346ce156919c99d25f56b1af" target="_blank">Servicios</a>
</div>

<div class="content">
    <!-- Carrusel de imágenes -->
    <div class="carousel">
        <img src="imagen1.jpg" alt="Publicidad 1">
        <img src="imagen2.jpg" alt="Publicidad 2">
        <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
        <a class="next" onclick="plusSlides(1)">&#10095;</a>
    </div>
    <div class="dots">
        <span class="dot" onclick="currentSlide(1)"></span>
        <span class="dot" onclick="currentSlide(2)"></span>
    </div>

    <h1 class="centrado">Acliclas lo mejor del mercado</h1>

    <!-- Sección "¿Por qué creamos Acliclas?" -->
    <h2>¿Por qué creamos Acliclas?</h2>
    <div class="row">
        <div class="column">
            <p>*Texto explicativo*</p>
        </div>
        <div class="column">
            <img src="imagen3.jpg" alt="Imagen representativa" width="100%">
        </div>
    </div>

    <!-- Sección "¿Qué hemos logrado?" -->
    <h2>¿Qué hemos logrado?</h2>
    <div class="row">
        <div class="column">
            <img src="imagen4.jpg" alt="Imagen de logro" width="100%">
            <p>Resumen de la imagen</p>
        </div>
        <div class="column">
            <img src="imagen5.jpg" alt="Imagen de logro" width="100%">
            <p>Resumen de la imagen</p>
        </div>
        <div class="column">
            <img src="imagen6.jpg" alt="Imagen de logro" width="100%">
            <p>Resumen de la imagen</p>
        </div>
    </div>

    <!-- Sección "Objetivos" -->
    <h2>Objetivos</h2>
    <div class="row">
        <div class="column">
            <img src="imagen7.jpg" alt="Imagen de objetivos" width="100%">
        </div>
        <div class="column">
            <p>*Texto explicativo de objetivos*</p>
        </div>
    </div>
</div>

<script>
    var slideIndex = 1;
    showSlides(slideIndex);

    function plusSlides(n) {
        showSlides(slideIndex += n);
    }

    function currentSlide(n) {
        showSlides(slideIndex = n);
    }

    function showSlides(n) {
        var i;
        var slides = document.getElementsByClassName("carousel img");
        var dots = document.getElementsByClassName("dot");
        if (n > slides.length) {slideIndex = 1}
        if (n < 1) {slideIndex = slides.length}
        for (i = 0; i < slides.length; i++) {
            slides[i].style.display = "none";
        }
        for (i = 0; i < dots.length; i++) {
            dots[i].className = dots[i].className.replace(" active", "");
        }
        slides[slideIndex-1].style.display = "block";
        dots[slideIndex-1].className += " active";
    }
</script>

</body>
</html>
